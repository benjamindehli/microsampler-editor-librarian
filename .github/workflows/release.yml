name: Release

# When you publish a GitHub release (you write the notes), build the dist ZIP and
# attach it as the release asset. You keep control of the notes; the matching,
# correctly-named ZIP is produced and uploaded automatically.
on:
  release:
    types: [published]

permissions:
  contents: write          # upload the release asset

jobs:
  package:
    name: build + attach release ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24.18.0"
      - run: npm ci

      # guard: the release tag (vX.Y.Z) must match package.json, and the docs
      # download link + bridge VERSION must already be stamped to it
      - name: Check tag matches package.json
        env:
          TAG: ${{ github.event.release.tag_name }}   # env, not inline: tag
        run: |                                        #  names can carry shell
          PKG="v$(node -p "require('./package.json').version")"
          echo "release tag: $TAG / package.json: $PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag $TAG does not match package.json $PKG (run npm version first)"; exit 1; }
      - name: Check version is stamped
        run: node tools/stamp-docs-version.mjs --check
      - name: Unit tests
        run: npm test

      # build dist/ and package release/<name>-v<version>.zip
      - name: Build and package
        run: npm run pack

      - name: Attach ZIP to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" release/*.zip --clobber
